name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
    paths-ignore:
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/CODEOWNERS"
      - ".coderabbit.yaml"
      - ".github/workflows/cargo-audit.yml"

jobs:
  hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repo hygiene guard
        run: bash scripts/verify/repo-hygiene-guard.sh

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all --check

      - name: Test compile check
        run: cargo check --workspace --tests

  dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build

  leaderboard-transparency:
    # I3 gate — cheap, always runs when retrieval code or leaderboard is touched.
    # Validates 8-field method cards, retraction log presence, gaming-audit
    # rule (>=0.90 requires audit/contested/recorded-unpinned marker), and
    # reproduction commands. Does not require a full bench rerun.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect leaderboard-impacting changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            transparency:
              - 'crates/memd-client/src/benchmark/**'
              - 'crates/memd-client/src/runtime/**'
              - 'crates/memd-server/**'
              - 'docs/verification/PUBLIC_LEADERBOARD.md'
              - 'scripts/regen-leaderboard.sh'

      - name: Run leaderboard transparency gate
        if: steps.changes.outputs.transparency == 'true'
        run: bash scripts/regen-leaderboard.sh --check

  bench-public:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect benchmark-impacting changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bench:
              - 'crates/memd-client/src/benchmark/**'
              - 'crates/memd-client/src/cli/args.rs'
              - 'crates/memd-client/src/cli/cli_analysis_runtime.rs'
              - 'crates/memd-client/src/runtime/**'
              - 'crates/memd-server/**'
              - 'crates/memd-schema/**'
              - '.memd/benchmarks/baselines/**'
              - 'Makefile'
              - 'docs/verification/PUBLIC_BENCHMARKS.md'
              - 'docs/verification/PUBLIC_LEADERBOARD.md'

      - name: Install Rust
        if: steps.changes.outputs.bench == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Refresh public benchmark docs
        if: steps.changes.outputs.bench == 'true'
        run: make bench

      - name: Fail on stale leaderboard docs
        if: steps.changes.outputs.bench == 'true'
        run: git diff --exit-code -- docs/verification/PUBLIC_BENCHMARKS.md docs/verification/PUBLIC_LEADERBOARD.md
