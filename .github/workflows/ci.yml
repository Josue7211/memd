name: ci

on:
  push:
  pull_request:
    paths-ignore:
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/CODEOWNERS"
      - ".coderabbit.yaml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/cargo-audit.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all --check

      - name: Test
        run: cargo test

  bench-public:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect benchmark-impacting changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bench:
              - 'crates/memd-client/src/benchmark/**'
              - 'crates/memd-client/src/cli/args.rs'
              - 'crates/memd-client/src/cli/cli_analysis_runtime.rs'
              - 'crates/memd-client/src/runtime/**'
              - 'crates/memd-server/**'
              - 'crates/memd-schema/**'
              - '.memd/benchmarks/baselines/**'
              - 'Makefile'
              - 'docs/verification/PUBLIC_BENCHMARKS.md'
              - 'docs/verification/PUBLIC_LEADERBOARD.md'

      - name: Install Rust
        if: steps.changes.outputs.bench == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Refresh public benchmark docs
        if: steps.changes.outputs.bench == 'true'
        run: make bench

      - name: Fail on stale leaderboard docs
        if: steps.changes.outputs.bench == 'true'
        run: git diff --exit-code -- docs/verification/PUBLIC_BENCHMARKS.md docs/verification/PUBLIC_LEADERBOARD.md
