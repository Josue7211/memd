name: substrate-bench

# A5.8 — V5 substrate benchmark gate.
#
# Push gate: runs on touches to substrate suite code/baselines/scripts.
# Nightly: runs at 04:00 UTC and fails if recall regresses below the
# locked baseline tolerance. G5.6 layers the V5 aggregator gate
# (`memd benchmark substrate --all`) on top so a missing composite
# fails the build.
#
# Security note: only trusted GitHub-provided context (runner.os,
# hashFiles, github.run_id) is interpolated into run: commands. No
# untrusted event inputs.

on:
  push:
    paths:
      - 'crates/memd-client/src/benchmark/substrate/**'
      - 'crates/memd-client/src/main_tests/substrate_a5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_b5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_c5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_d5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_e5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_f5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_g5_tests/**'
      - 'docs/verification/substrate-baselines/**'
      - 'docs/verification/SUBSTRATE_BENCHMARKS.md'
      - 'docs/verification/SUBSTRATE_COMPETITOR.md'
      - 'docs/verification/MEMD-10-STAR.md'
      - '.memd/benchmarks/substrate/fixtures/**'
      - 'scripts/substrate-bench-reproduce.sh'
      - '.github/workflows/substrate-bench.yml'
  pull_request:
    paths:
      - 'crates/memd-client/src/benchmark/substrate/**'
      - 'crates/memd-client/src/main_tests/substrate_a5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_b5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_c5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_d5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_e5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_f5_tests/**'
      - 'crates/memd-client/src/main_tests/substrate_g5_tests/**'
      - 'docs/verification/substrate-baselines/**'
      - 'docs/verification/SUBSTRATE_BENCHMARKS.md'
      - 'docs/verification/SUBSTRATE_COMPETITOR.md'
      - 'docs/verification/MEMD-10-STAR.md'
      - '.memd/benchmarks/substrate/fixtures/**'
      - 'scripts/substrate-bench-reproduce.sh'
      - '.github/workflows/substrate-bench.yml'
  schedule:
    - cron: '0 4 * * *'

jobs:
  substrate-a5:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/memd-target
          key: substrate-a5-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: substrate-a5-${{ runner.os }}-

      - name: Substrate A5+B5 unit + integration tests
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=/tmp/memd-target \
            cargo test --target-dir /tmp/memd-target -p memd-client --bin memd substrate

      - name: Substrate A5 reproducibility (release path)
        run: |
          set -euo pipefail
          bash scripts/substrate-bench-reproduce.sh --seed 42

      - name: Substrate B5 reproducibility (release path)
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=/tmp/memd-target \
            cargo run --release --target-dir /tmp/memd-target -p memd-client -- \
            benchmark substrate --suite correction-propagation --seed 43 \
            --output /tmp/memd-substrate-b5-out \
            --report /tmp/memd-substrate-b5-report.md

      - name: Substrate C5 reproducibility (release path, skip if harness configs missing)
        env:
          MEMD_SUBSTRATE_C5_HARNESS_ALLOW_SKIP: "1"
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=/tmp/memd-target \
            cargo run --release --target-dir /tmp/memd-target -p memd-client -- \
            benchmark substrate --suite cross-harness --seed 44 \
            --output /tmp/memd-substrate-c5-out \
            --report /tmp/memd-substrate-c5-report.md

      - name: Substrate D5 reproducibility (release path)
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=/tmp/memd-target \
            cargo run --release --target-dir /tmp/memd-target -p memd-client -- \
            benchmark substrate --suite progressive-depth --seed 44 \
            --output /tmp/memd-substrate-d5-out \
            --report /tmp/memd-substrate-d5-report.md

      - name: Substrate E5 reproducibility (release path)
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=/tmp/memd-target \
            cargo run --release --target-dir /tmp/memd-target -p memd-client -- \
            benchmark substrate --suite provenance-integrity --seed 45 \
            --output /tmp/memd-substrate-e5-out \
            --report /tmp/memd-substrate-e5-report.md

      - name: Substrate F5 reproducibility (release path)
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=/tmp/memd-target \
            cargo run --release --target-dir /tmp/memd-target -p memd-client -- \
            benchmark substrate --suite typed-retrieval --seed 46 \
            --output /tmp/memd-substrate-f5-out \
            --report /tmp/memd-substrate-f5-report.md

      - name: Substrate G5 reproducibility (release path)
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=/tmp/memd-target \
            cargo run --release --target-dir /tmp/memd-target -p memd-client -- \
            benchmark substrate --suite adversarial-noise --seed 40 \
            --output /tmp/memd-substrate-g5-out \
            --report /tmp/memd-substrate-g5-report.md

      - name: V5 aggregator gate (memd benchmark substrate --all)
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=/tmp/memd-target \
            cargo run --release --target-dir /tmp/memd-target -p memd-client -- \
            benchmark substrate --all \
            --output /tmp/memd-substrate-all-out \
            --report /tmp/memd-substrate-all-report.md \
            --regenerate-report

      - name: Upload substrate results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: substrate-results-${{ github.run_id }}
          path: .memd/benchmarks/substrate/results/
          if-no-files-found: ignore

      - name: Upload V5 aggregator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: substrate-aggregator-report-${{ github.run_id }}
          path: /tmp/memd-substrate-all-report.md
          if-no-files-found: ignore
