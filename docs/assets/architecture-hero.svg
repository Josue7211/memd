<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080c17" />
      <stop offset="0.55" stop-color="#101a34" />
      <stop offset="1" stop-color="#0b1226" />
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 250) rotate(90) scale(230 330)">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.20" />
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 280) rotate(90) scale(240 320)">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18" />
      <stop offset="1" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.32" />
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.24" />
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa" />
    </marker>
    <style>
      .title { font: 700 42px/1.05 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #f8fafc; letter-spacing: -0.04em; }
      .sub { font: 500 18px/1.35 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #cbd5e1; }
      .section { font: 700 20px/1.2 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #e2e8f0; letter-spacing: -0.02em; }
      .label { font: 600 16px/1.25 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #edf4ff; }
      .small { font: 500 12px/1.35 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #aab8cf; }
      .micro { font: 500 11px/1.35 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #8da1bf; }
      .pill { font: 700 12px/1 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #dbeafe; letter-spacing: 0.03em; }
      .mono { font: 600 12px/1.35 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #d9e8ff; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#blueGlow)" />
  <rect width="1600" height="900" fill="url(#greenGlow)" />

  <g opacity="0.08">
    <path d="M0 120H1600" stroke="#93c5fd" stroke-width="1" />
    <path d="M0 240H1600" stroke="#93c5fd" stroke-width="1" />
    <path d="M0 360H1600" stroke="#93c5fd" stroke-width="1" />
    <path d="M0 480H1600" stroke="#93c5fd" stroke-width="1" />
    <path d="M0 600H1600" stroke="#93c5fd" stroke-width="1" />
    <path d="M0 720H1600" stroke="#93c5fd" stroke-width="1" />
    <path d="M180 0V900" stroke="#93c5fd" stroke-width="1" />
    <path d="M380 0V900" stroke="#93c5fd" stroke-width="1" />
    <path d="M580 0V900" stroke="#93c5fd" stroke-width="1" />
    <path d="M780 0V900" stroke="#93c5fd" stroke-width="1" />
    <path d="M980 0V900" stroke="#93c5fd" stroke-width="1" />
    <path d="M1180 0V900" stroke="#93c5fd" stroke-width="1" />
    <path d="M1380 0V900" stroke="#93c5fd" stroke-width="1" />
  </g>

  <text x="72" y="92" class="title">memd architecture</text>
  <text x="72" y="124" class="sub">read once, compile once, reuse many, and keep evidence linked</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="300" height="560" rx="28" fill="#0f1f3a" stroke="#60a5fa" stroke-opacity="0.60" stroke-width="2" />
    <rect x="430" y="150" width="670" height="610" rx="30" fill="#0d1a31" stroke="#4fd1c5" stroke-opacity="0.72" stroke-width="2.5" />
    <rect x="1140" y="188" width="360" height="350" rx="26" fill="#0f2d29" stroke="#34d399" stroke-opacity="0.60" stroke-width="2" />
  </g>

  <text x="102" y="210" class="section">Live inputs</text>
  <text x="102" y="236" class="small">harness packs, vaults, and human review</text>

  <g filter="url(#softShadow)">
    <rect x="96" y="268" width="248" height="106" rx="18" fill="#10213f" stroke="#7dd3fc" stroke-opacity="0.45" />
    <text x="118" y="300" class="label">Harness packs</text>
    <text x="118" y="324" class="micro">Codex, Claude Code, OpenCode,</text>
    <text x="118" y="340" class="micro">OpenClaw, Hermes, Agent Zero</text>

    <rect x="96" y="386" width="248" height="80" rx="18" fill="#10213f" stroke="#7dd3fc" stroke-opacity="0.45" />
    <text x="118" y="418" class="label">Obsidian vault</text>
    <text x="118" y="442" class="micro">wikilinks, compiled pages, backlinks</text>

    <rect x="96" y="478" width="248" height="80" rx="18" fill="#10213f" stroke="#7dd3fc" stroke-opacity="0.45" />
    <text x="118" y="510" class="label">Human review</text>
    <text x="118" y="534" class="micro">inbox, explain, promotion, cleanup</text>

    <rect x="96" y="570" width="248" height="120" rx="18" fill="#10213f" stroke="#7dd3fc" stroke-opacity="0.40" />
    <text x="118" y="604" class="label">Live work surface</text>
    <text x="118" y="630" class="micro">session scope</text>
    <text x="118" y="652" class="micro">tab scope</text>
    <text x="118" y="674" class="micro">project scope</text>
  </g>

  <text x="462" y="198" class="section">memd control plane</text>
  <text x="462" y="224" class="small">routes, compacts, verifies, and keeps the visible memory surface honest</text>

  <g filter="url(#softShadow)">
    <rect x="462" y="256" width="618" height="172" rx="24" fill="#10213f" stroke="#7dd3fc" stroke-opacity="0.38" />
    <text x="484" y="290" class="label">Core flow</text>
    <text x="484" y="312" class="micro">route · compact · explain</text>

    <line x1="668" y1="282" x2="668" y2="404" stroke="#2f5b84" stroke-opacity="0.9" stroke-width="1.5" />
    <line x1="874" y1="282" x2="874" y2="404" stroke="#2f5b84" stroke-opacity="0.9" stroke-width="1.5" />

    <text x="484" y="344" class="label">Routing</text>
    <text x="484" y="366" class="micro">route + intent</text>
    <text x="484" y="386" class="micro">scope-aware order</text>

    <text x="690" y="344" class="label">Working memory</text>
    <text x="690" y="366" class="micro">compact buffer</text>
    <text x="690" y="386" class="micro">evict / rehydrate</text>

    <text x="896" y="344" class="label">Inbox / explain</text>
    <text x="896" y="366" class="micro">why it exists</text>
    <text x="896" y="386" class="micro">what needs attention</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="462" y="452" width="618" height="120" rx="22" fill="#10213f" stroke="#7dd3fc" stroke-opacity="0.36" />
    <text x="484" y="486" class="label">SQLite memory store</text>
    <text x="484" y="512" class="micro">memory items, entities, events, links, profiles, claims, tasks</text>

    <rect x="484" y="530" width="120" height="34" rx="14" fill="#163154" stroke="#7dd3fc" stroke-opacity="0.35" />
    <text x="544" y="552" class="pill" text-anchor="middle">dedupe</text>

    <rect x="616" y="530" width="120" height="34" rx="14" fill="#163154" stroke="#7dd3fc" stroke-opacity="0.35" />
    <text x="676" y="552" class="pill" text-anchor="middle">freshness</text>

    <rect x="748" y="530" width="120" height="34" rx="14" fill="#163154" stroke="#7dd3fc" stroke-opacity="0.35" />
    <text x="808" y="552" class="pill" text-anchor="middle">TTL</text>

    <rect x="880" y="530" width="112" height="34" rx="14" fill="#163154" stroke="#7dd3fc" stroke-opacity="0.35" />
    <text x="936" y="552" class="pill" text-anchor="middle">policy</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="462" y="590" width="618" height="112" rx="22" fill="#10213f" stroke="#7dd3fc" stroke-opacity="0.36" />
    <text x="484" y="624" class="label">Visible memory surface</text>
    <text x="484" y="650" class="micro">compiled pages, items, lanes, events, and linked review surfaces</text>
    <text x="484" y="676" class="micro">what changed, what is trusted, what still needs attention</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="462" y="716" width="618" height="18" rx="9" fill="#24184c" stroke="#a78bfa" stroke-opacity="0.45" />
    <text x="484" y="729" class="pill">verify • decay • consolidate</text>
  </g>

  <text x="1170" y="228" class="section">Semantic backend</text>
  <text x="1170" y="252" class="small">optional long-term recall behind the control plane</text>

  <g filter="url(#softShadow)">
    <rect x="1164" y="286" width="320" height="88" rx="18" fill="#113631" stroke="#34d399" stroke-opacity="0.46" />
    <text x="1186" y="320" class="label">rag-sidecar</text>
    <text x="1186" y="344" class="micro">request shaping, backend bridge, health</text>

    <rect x="1164" y="398" width="320" height="88" rx="18" fill="#113631" stroke="#34d399" stroke-opacity="0.46" />
    <text x="1186" y="432" class="label">LightRAG / compatible backend</text>
    <text x="1186" y="456" class="micro">semantic recall, project/global memory</text>

    <rect x="1164" y="494" width="320" height="34" rx="17" fill="#123c35" stroke="#34d399" stroke-opacity="0.38" />
    <text x="1324" y="516" class="pill" text-anchor="middle">video / PDF / image / table / equation</text>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M344 310 C392 310, 414 310, 462 310" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrowBlue)" />
    <path d="M344 428 C392 428, 414 428, 462 428" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrowBlue)" />
    <path d="M344 518 C392 518, 414 518, 462 518" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrowBlue)" />
    <path d="M344 638 C392 638, 414 638, 462 638" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrowBlue)" />

    <path d="M462 342 C420 342, 404 342, 360 342" stroke="#7dd3fc" stroke-width="2" stroke-opacity="0.0" />
    <path d="M1108 344 C1132 344, 1142 344, 1164 344" stroke="#34d399" stroke-width="3" marker-end="url(#arrowGreen)" />
    <path d="M1108 530 C1132 530, 1142 530, 1164 530" stroke="#34d399" stroke-width="3" marker-end="url(#arrowGreen)" />

    <path d="M462 516 C430 516, 418 516, 388 516" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.0" />
  </g>
</svg>
