      .sub { font: 500 18px/1.35 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #cbd5e1; }
      .section { font: 700 20px/1.2 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #e2e8f0; letter-spacing: -0.02em; }
      .label { font: 600 16px/1.25 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #edf4ff; }
      .small { font: 500 12px/1.35 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #aab8cf; }
      .micro { font: 500 11px/1.35 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #8da1bf; }
      .pill { font: 700 12px/1 "Inter", "Aptos", "Segoe UI", sans-serif; fill: #dbeafe; letter-spacing: 0.03em; }
