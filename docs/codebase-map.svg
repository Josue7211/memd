<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f" />
      <stop offset="0.55" stop-color="#0d1a2e" />
      <stop offset="1" stop-color="#0a1526" />
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 240) rotate(90) scale(280 360)">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.18" />
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="greenGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1460 420) rotate(90) scale(320 420)">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.16" />
      <stop offset="1" stop-color="#34d399" stop-opacity="0" />
