services:
  memd-server:
    image: ${MEMD_SERVER_IMAGE:-memd-server:openclaw}
    container_name: memd-server
    restart: unless-stopped
    environment:
      MEMD_DB_PATH: /data/memd.db
      MEMD_BIND_ADDR: 0.0.0.0:8787
      MEMD_AUTHORITY_SEARCH: ${MEMD_AUTHORITY_SEARCH:-0}
      MEMD_AUTHORITY_TOKEN: ${MEMD_AUTHORITY_TOKEN:-}
      MEMD_GIT_BRANCH: ${MEMD_GIT_BRANCH:-unknown}
      MEMD_GIT_COMMIT: ${MEMD_GIT_COMMIT:-unknown}
      MEMD_GIT_DIRTY: ${MEMD_GIT_DIRTY:-unknown}
    ports:
      - "${MEMD_SERVER_PORT:-8787}:8787"
    volumes:
      - memd_server_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  memd_server_data:
